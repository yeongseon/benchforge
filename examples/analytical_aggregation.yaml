# ============================================================================
# Analytical Aggregation — GROUP BY with large scans
# ============================================================================
# Measures how the database handles full-table scans with aggregation.
# This is representative of OLAP-style queries: dashboards, reports,
# and ad-hoc analytics over transactional data.
#
# What to look for:
#   - Throughput plateau under concurrency (CPU-bound vs IO-bound)
#   - Latency variance across iterations (buffer cache warming)
#   - Comparison of sequential scan performance across drivers
# ============================================================================

name: analytical-aggregation
description: >
  Aggregation queries over a 500K-row orders table. Exercises full-table
  scans, GROUP BY, and ORDER BY. Represents typical OLAP/reporting
  workloads running against a transactional database.

setup:
  queries:
    - >
      CREATE TABLE IF NOT EXISTS orders (
        id          SERIAL PRIMARY KEY,
        customer_id INT NOT NULL,
        product     VARCHAR(50) NOT NULL,
        quantity    INT NOT NULL,
        unit_price  NUMERIC(10,2) NOT NULL,
        region      VARCHAR(20) NOT NULL,
        created_at  TIMESTAMP NOT NULL DEFAULT now()
      )
    - >
      INSERT INTO orders (customer_id, product, quantity, unit_price, region, created_at)
      SELECT
        (random() * 10000)::int + 1,
        (ARRAY['Widget','Gadget','Sprocket','Bolt','Nut','Washer','Gear','Bracket'])[floor(random()*8+1)::int],
        (random() * 20)::int + 1,
        round((random() * 100 + 1)::numeric, 2),
        (ARRAY['us-east','us-west','eu-west','eu-central','ap-south'])[floor(random()*5+1)::int],
        now() - (random() * interval '365 days')
      FROM generate_series(1, 500000) AS i

teardown:
  queries:
    - "DROP TABLE IF EXISTS orders"

steps:
  - name: revenue-by-region
    query: >
      SELECT region, SUM(quantity * unit_price) AS total_revenue,
             COUNT(*) AS order_count, AVG(unit_price) AS avg_price
      FROM orders
      GROUP BY region
      ORDER BY total_revenue DESC

  - name: top-products
    query: >
      SELECT product, SUM(quantity) AS total_sold,
             SUM(quantity * unit_price) AS revenue
      FROM orders
      GROUP BY product
      ORDER BY revenue DESC
      LIMIT 5

load:
  concurrency: 4
  duration: 30
  warmup:
    duration: 5

experiment:
  iterations: 3
  seed: 7
  pause_between: 5.0

targets:
  - name: psycopg-raw
    stack_id: python+psycopg
    driver: psycopg
    dsn: "postgresql://postgres:postgres@localhost:5432/benchforge"

  - name: sqlalchemy-core
    stack_id: python+sqlalchemy
    driver: sqlalchemy
    dsn: "postgresql+psycopg://postgres:postgres@localhost:5432/benchforge"
