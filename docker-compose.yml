services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: benchforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  cubrid:
    image: cubrid/cubrid:11.2
    shm_size: 256m
    environment:
      CUBRID_DB: benchdb
    ports:
      - "33000:33000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/33000'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_DATABASE: benchdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -pbench --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  pgdata:
