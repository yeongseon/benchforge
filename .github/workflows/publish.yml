# Publish to PyPI on version tag push
#
# Trigger: push a tag matching v* (e.g., v0.1.0)
# Steps:  build sdist + wheel → upload to PyPI via Trusted Publisher
#
# Setup required:
#   1. Create a PyPI project "benchflow"
#   2. Configure Trusted Publisher in PyPI project settings:
#      - Repository: yeongseon/benchflow
#      - Workflow:   publish.yml
#      - Environment: pypi

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
